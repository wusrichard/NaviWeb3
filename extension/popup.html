<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaviWeb3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 480px;
      background: #0d0f1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0d1224 100%);
      border-bottom: 1px solid #2d3748;
      padding: 16px 20px 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-left: 36px;
    }

    .main {
      padding: 16px 20px;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }


    textarea {
      width: 100%;
      padding: 10px 12px;
      background: #1a1f35;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      resize: none;
      height: 80px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
      font-family: inherit;
      line-height: 1.5;
    }

    textarea::placeholder { color: #475569; }
    textarea:focus { border-color: #6366f1; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn-submit {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-clear {
      padding: 10px 14px;
      background: #1a1f35;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #64748b;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover { border-color: #ef4444; color: #f87171; }

    .result-box {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 14px;
      min-height: 120px;
      line-height: 1.7;
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-box.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: 12px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #6366f1;
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #312e81;
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #f87171; font-size: 13px; }

    .wallet-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      padding: 8px 20px;
      min-height: 38px;
    }

    .wallet-status {
      font-size: 11px;
      color: #475569;
    }

    .wallet-status.connected {
      color: #34d399;
    }

    .wallet-balances {
      display: flex;
      gap: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .bal-eth { color: #818cf8; }
    .bal-weeth { color: #a78bfa; }
    .bal-usdc { color: #34d399; }

    .quick-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }

    .quick-btn {
      padding: 7px 6px;
      background: #1a1f35;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .quick-btn:hover {
      border-color: #a78bfa;
      color: #c4b5fd;
      background: #1e1b4b;
    }

    .btn-wallet {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-wallet:hover { border-color: #6366f1; color: #a5b4fc; }
    .btn-wallet:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #1e293b;
      font-size: 10px;
      color: #334155;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🧭</div>
    <span class="logo-text">NaviWeb3</span>
  </div>
  <div class="subtitle">DeFi 操作路徑 AI 顧問</div>
</div>

<div class="wallet-bar">
  <div id="walletStatus" class="wallet-status">未連接錢包</div>
  <div id="walletBalances" class="wallet-balances" style="display:none">
    <span class="bal-eth">ETH: <b id="ethBal">-</b></span>
    <span class="bal-weeth">weETH: <b id="weethBal">-</b></span>
    <span class="bal-usdc">USDC: <b id="usdcBal">-</b></span>
  </div>
  <button class="btn-wallet" id="connectBtn">連接錢包</button>
</div>

<div class="main">
  <div class="label">快捷操作</div>
  <div class="quick-group">
    <button class="quick-btn">USDC → ETH</button>
    <button class="quick-btn">ETH → weETH</button>
    <button class="quick-btn">weETH → ETH</button>
    <button class="quick-btn">查看收益</button>
  </div>

  <div class="label">你的問題</div>
  <textarea id="question" placeholder="例如：weETH 怎麼換回 ETH 最方便？費用多少？"></textarea>

  <div class="btn-row">
    <button class="btn-submit" id="submitBtn">詢問 AI 顧問</button>
    <button class="btn-clear" id="clearBtn">清除</button>
  </div>

  <div class="label">建議</div>
  <div class="result-box empty" id="resultBox">等待你的問題…</div>

  <div id="executeSection" style="display:none; margin-top:10px;">
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <input id="execAddr" placeholder="目標地址 0x..." style="flex:1;padding:7px 10px;background:#1a1f35;border:1px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:12px;outline:none;"/>
      <input id="execAmount" placeholder="金額" style="width:72px;padding:7px 8px;background:#1a1f35;border:1px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:12px;outline:none;"/>
    </div>
    <button id="executeBtn" style="width:100%;padding:9px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">⚡ 用 Cobo Wallet 執行交易</button>
    <div id="execResult" style="margin-top:8px;font-size:11px;color:#64748b;word-break:break-all;"></div>
  </div>
</div>

<div class="footer">Powered by Z.AI GLM-4-Flash · NaviWeb3</div>

<script src="popup.js"></script>

</body>
</html>
